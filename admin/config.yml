# Auth via DecapBridge (remplace Netlify Identity, devenu obsolete)
backend:
  name: git-gateway
  repo: mclrglobal-boop/ov-peptides-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/df169527-7217-401c-adf1-f07bd858a622/pkce
  auth_token_endpoint: /sites/df169527-7217-401c-adf1-f07bd858a622/token
  gateway_url: https://gateway.decapbridge.com

commit_messages:
  create: 'Create "{{collection}}" "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  update: 'Update "{{collection}}" "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  delete: 'Delete "{{collection}}" "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
  openAuthoring: '{{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://ov-peptides.netlify.app

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "fr"

collections:
  - name: "site"
    label: "Site OV Peptides"
    files:
      - file: "content/site.json"
        label: "Contenu du site"
        name: "site"
        fields:
          - label: "Hero (haut de page)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Petit badge au-dessus du titre", name: "eyebrow", widget: "string" }
              - { label: "Titre (première partie)", name: "title_line", widget: "string" }
              - { label: "Titre (partie en dégradé)", name: "title_accent", widget: "string" }
              - { label: "Texte d'introduction", name: "lead", widget: "text" }
              - { label: "Texte du bouton principal", name: "cta_primary", widget: "string" }
              - { label: "Texte du bouton secondaire", name: "cta_secondary", widget: "string" }
              - { label: "Badge de confiance 1", name: "stat1", widget: "string" }
              - { label: "Badge de confiance 2", name: "stat2", widget: "string" }
              - { label: "Badge de confiance 3", name: "stat3", widget: "string" }

          - label: "Section Problème"
            name: "problem"
            widget: "object"
            fields:
              - { label: "Titre de la section", name: "title", widget: "string" }
              - { label: "Carte 1 - titre", name: "card1_title", widget: "string" }
              - { label: "Carte 1 - texte", name: "card1_text", widget: "text" }
              - { label: "Carte 2 - titre", name: "card2_title", widget: "string" }
              - { label: "Carte 2 - texte", name: "card2_text", widget: "text" }
              - { label: "Carte 3 - titre", name: "card3_title", widget: "string" }
              - { label: "Carte 3 - texte", name: "card3_text", widget: "text" }

          - label: "Section Catalogue"
            name: "cure"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Sous-titre", name: "subtitle", widget: "text" }
              - { label: "Fonction 1 - titre", name: "feature1_title", widget: "string" }
              - { label: "Fonction 1 - texte", name: "feature1_text", widget: "text" }
              - { label: "Fonction 2 - titre", name: "feature2_title", widget: "string" }
              - { label: "Fonction 2 - texte", name: "feature2_text", widget: "text" }
              - { label: "Fonction 3 - titre", name: "feature3_title", widget: "string" }
              - { label: "Fonction 3 - texte", name: "feature3_text", widget: "text" }
              - { label: "Fonction 4 - titre", name: "feature4_title", widget: "string" }
              - { label: "Fonction 4 - texte", name: "feature4_text", widget: "text" }

          - label: "Section Support technique"
            name: "bilan"
            widget: "object"
            fields:
              - { label: "Badge", name: "eyebrow", widget: "string" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Texte", name: "text", widget: "text" }

          - label: "Chiffres clés"
            name: "stats"
            widget: "object"
            fields:
              - { label: "Chiffre 1", name: "stat1_number", widget: "string" }
              - { label: "Légende 1", name: "stat1_label", widget: "string" }
              - { label: "Chiffre 2", name: "stat2_number", widget: "string" }
              - { label: "Légende 2", name: "stat2_label", widget: "string" }
              - { label: "Chiffre 3", name: "stat3_number", widget: "string" }
              - { label: "Légende 3", name: "stat3_label", widget: "string" }

          - label: "Mot du fondateur"
            name: "founder"
            widget: "object"
            fields:
              - { label: "Nom du fondateur", name: "name", widget: "string" }
              - { label: "Paragraphe 1", name: "paragraph1", widget: "text" }
              - { label: "Paragraphe 2", name: "paragraph2", widget: "text" }
              - { label: "Paragraphe 3", name: "paragraph3", widget: "text" }
              - { label: "Avertissement", name: "disclaimer", widget: "text" }

          - label: "Retours de laboratoires / chercheurs"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Rôle / structure (ex: Responsable R&D, biotech)", name: "name_line", widget: "string" }
              - { label: "Contexte du retour", name: "story", widget: "text" }
              - { label: "Citation (sans les guillemets)", name: "quote", widget: "text" }

          - label: "Références (tarifs)"
            name: "pricing"
            widget: "list"
            fields:
              - { label: "Nom de la référence", name: "name", widget: "string" }
              - { label: "Sous-titre", name: "subtitle", widget: "string" }
              - { label: "Prix affiché", name: "price", widget: "string" }
              - { label: "Note (frais de port...)", name: "note", widget: "string" }
              - { label: "Avantage 1", name: "feature1", widget: "string" }
              - { label: "Avantage 2", name: "feature2", widget: "string" }
              - { label: "Avantage 3", name: "feature3", widget: "string" }
              - { label: "Lien de paiement Stripe", name: "stripe_link", widget: "string" }

          - label: "Questions fréquentes (FAQ)"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Réponse", name: "answer", widget: "text" }

          - label: "Appel à l'action final"
            name: "final_cta"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Texte", name: "text", widget: "string" }
              - { label: "Bouton principal", name: "cta_primary", widget: "string" }
              - { label: "Bouton secondaire", name: "cta_secondary", widget: "string" }

          - label: "Pied de page"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Slogan", name: "tagline", widget: "string" }
              - { label: "Avertissement légal", name: "disclaimer", widget: "text" }
              - { label: "Copyright", name: "copyright", widget: "string" }
